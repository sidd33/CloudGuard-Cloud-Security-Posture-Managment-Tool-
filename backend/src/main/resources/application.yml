spring:
  application:
    name: cloudguard
  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27017/cloudguard}

server:
  port: 8080

cloudguard:
  encryption-key: ${CLOUDGUARD_ENCRYPTION_KEY:12345678901234567890123456789012}
  jwt-secret: ${JWT_SECRET:supersecretjwtkeythatneedstobelongerthan32bytes1234}
  opa:
    url: ${OPA_URL:http://localhost:8181}
